#org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
#android.useAndroidX=true

# Configuração Otimizada
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# AndroidX (Obrigatório para apps modernas)
android.useAndroidX=true
android.enableJetifier=true

# Melhora a velocidade de builds subsequentes
org.gradle.parallel=true
org.gradle.caching=true